<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Debug Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #00ff00;
            margin-bottom: 20px;
            text-align: center;
        }

        .upload-area {
            background: #2a2a2a;
            border: 2px dashed #00ff00;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #3a3a3a;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
        }

        button:hover {
            background: #00cc00;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            background: #2a2a2a;
            padding: 20px;
            border: 1px solid #00ff00;
            margin-top: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 600px;
            overflow-y: auto;
        }

        .error {
            color: #ff0000;
        }

        .success {
            color: #00ff00;
        }

        img {
            max-width: 300px;
            margin: 20px 0;
            border: 2px solid #00ff00;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔍 GEMINI API DEBUG TEST</h1>

        <div class="upload-area" id="uploadArea">
            <h2>📸 Upload or Capture Image</h2>
            <p>Click to select image or drag and drop</p>
        </div>

        <input type="file" id="fileInput" accept="image/*" capture="environment" style="display: none;">

        <div style="text-align: center;">
            <button id="testBtn" disabled>🧪 Test with Gemini API</button>
            <button id="clearBtn">🗑️ Clear</button>
        </div>

        <div id="preview" style="text-align: center;"></div>

        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const testBtn = document.getElementById('testBtn');
        const clearBtn = document.getElementById('clearBtn');
        const preview = document.getElementById('preview');
        const result = document.getElementById('result');

        let capturedImage = null;

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#3a3a3a';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '#2a2a2a';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#2a2a2a';

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                capturedImage = e.target.result;
                preview.innerHTML = `<img src="${capturedImage}" alt="Preview">`;
                testBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        testBtn.addEventListener('click', async () => {
            if (!capturedImage) {
                alert('Please upload an image first');
                return;
            }

            result.style.display = 'block';
            result.innerHTML = '<div class="loading"><div class="spinner"></div><p>Calling Gemini API...</p></div>';
            testBtn.disabled = true;

            try {
                const response = await fetch('backend/api/test_gemini.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        palm_image_data: capturedImage
                    })
                });

                const data = await response.json();

                result.innerHTML = '<h3 class="success">✅ API RESPONSE:</h3>\n\n' +
                    JSON.stringify(data, null, 2);

            } catch (error) {
                result.innerHTML = '<h3 class="error">❌ ERROR:</h3>\n\n' + error.message;
            } finally {
                testBtn.disabled = false;
            }
        });

        clearBtn.addEventListener('click', () => {
            capturedImage = null;
            preview.innerHTML = '';
            result.style.display = 'none';
            result.innerHTML = '';
            testBtn.disabled = true;
            fileInput.value = '';
        });
    </script>
</body>

</html>
