<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Recognition Test - PVPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        #video-container {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        #webcam {
            width: 100%;
            display: block;
        }

        #canvas {
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status-box {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .status-info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }

        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .status-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .status-warning {
            background: #fff3e0;
            color: #ef6c00;
            border-left: 4px solid #ef6c00;
        }

        .analysis-section {
            margin-top: 20px;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .analysis-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .analysis-item h4 {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .analysis-item p {
            color: #333;
            font-size: 0.95rem;
            margin: 5px 0;
        }

        .detected-objects {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .object-tag {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .suggestion-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .suggestion-box h4 {
            color: #856404;
            margin-bottom: 8px;
        }

        .suggestion-box p {
            color: #856404;
            line-height: 1.6;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖐️ Hand Recognition Test</h1>
            <p>Comprehensive Hand Biometric Analysis System</p>
        </div>

        <div class="main-content">
            <!-- Camera Section -->
            <div class="card">
                <h2>📸 Camera Feed</h2>
                <div id="video-container">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                </div>
                
                <div class="controls">
                    <button id="startCamera" class="btn-primary">Start Camera</button>
                    <button id="stopCamera" class="btn-secondary" disabled>Stop Camera</button>
                </div>
                
                <div class="controls">
                    <button id="captureBtn" class="btn-success" disabled>Capture Hand</button>
                    <button id="analyzeBtn" class="btn-primary" disabled>Analyze Hand</button>
                </div>

                <div id="statusBox" class="status-box status-info">
                    Click "Start Camera" to begin hand recognition
                </div>
            </div>

            <!-- Analysis Results -->
            <div class="card">
                <h2>📊 Analysis Results</h2>
                <div id="resultsContainer">
                    <p style="color: #999; text-align: center; padding: 40px 0;">
                        Capture and analyze a hand to see results
                    </p>
                </div>
            </div>
        </div>

        <!-- Detailed Analytics -->
        <div class="card full-width" id="detailedAnalytics" style="display: none;">
            <h2>🔍 Detailed Hand Analytics</h2>
            <div class="analysis-grid" id="analyticsGrid"></div>
        </div>
    </div>

    <script>
        let stream = null;
        let capturedImage = null;

        const webcam = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startCamera');
        const stopBtn = document.getElementById('stopCamera');
        const captureBtn = document.getElementById('captureBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusBox = document.getElementById('statusBox');
        const resultsContainer = document.getElementById('resultsContainer');
        const detailedAnalytics = document.getElementById('detailedAnalytics');
        const analyticsGrid = document.getElementById('analyticsGrid');

        // Start camera
        startBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 640, height: 480 } 
                });
                webcam.srcObject = stream;
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                captureBtn.disabled = false;
                
                updateStatus('success', 'Camera started. Position your hand with fingers spread open.');
            } catch (error) {
                updateStatus('error', 'Failed to access camera: ' + error.message);
            }
        });

        // Stop camera
        stopBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                webcam.srcObject = null;
                
                startBtn.disabled = false;
                stopBtn.disabled = true;
                captureBtn.disabled = true;
                analyzeBtn.disabled = true;
                
                updateStatus('info', 'Camera stopped.');
            }
        });

        // Capture hand
        captureBtn.addEventListener('click', () => {
            canvas.width = webcam.videoWidth;
            canvas.height = webcam.videoHeight;
            ctx.drawImage(webcam, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.9);
            
            analyzeBtn.disabled = false;
            updateStatus('success', 'Hand captured! Click "Analyze Hand" to process.');
        });

        // Analyze hand
        analyzeBtn.addEventListener('click', async () => {
            if (!capturedImage) {
                updateStatus('error', 'Please capture an image first.');
                return;
            }

            updateStatus('info', '<span class="loading"></span> Analyzing hand with AI...');
            analyzeBtn.disabled = true;

            try {
                const response = await fetch('backend/api/palm_recognition.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'analyze',
                        palm_image_data: capturedImage
                    })
                });

                const result = await response.json();
                displayResults(result);
                analyzeBtn.disabled = false;
            } catch (error) {
                updateStatus('error', 'Analysis failed: ' + error.message);
                analyzeBtn.disabled = false;
            }
        });

        function updateStatus(type, message) {
            statusBox.className = `status-box status-${type}`;
            statusBox.innerHTML = message;
        }

        function displayResults(result) {
            if (!result.success) {
                updateStatus('error', result.message || 'Analysis failed');
                resultsContainer.innerHTML = `
                    <div class="status-error">
                        <strong>Error:</strong> ${result.message}
                    </div>
                `;
                return;
            }

            const isValid = result.isValidHand || result.isPalm;
            const confidence = Math.round((result.confidence || 0) * 100);

            if (isValid) {
                updateStatus('success', `✅ Valid hand detected with ${confidence}% confidence!`);
            } else {
                updateStatus('error', `❌ ${result.message}`);
            }

            // Display basic results
            let html = `
                <div class="status-${isValid ? 'success' : 'error'}">
                    <strong>${isValid ? '✅ Valid Hand' : '❌ Invalid'}</strong><br>
                    Confidence: ${confidence}%
                </div>
            `;

            // Show detected objects
            if (result.detected_objects && result.detected_objects.length > 0) {
                html += `
                    <div style="margin-top: 15px;">
                        <h4 style="color: #667eea; margin-bottom: 8px;">Detected Objects:</h4>
                        <div class="detected-objects">
                            ${result.detected_objects.map(obj => 
                                `<span class="object-tag">${obj}</span>`
                            ).join('')}
                        </div>
                    </div>
                `;
            }

            // Show suggestion if available
            if (result.suggestion) {
                html += `
                    <div class="suggestion-box">
                        <h4>💡 Suggestion</h4>
                        <p>${result.suggestion}</p>
                    </div>
                `;
            }

            resultsContainer.innerHTML = html;

            // Display detailed analytics
            if (result.analytics) {
                displayDetailedAnalytics(result.analytics);
            }
        }

        function displayDetailedAnalytics(analytics) {
            detailedAnalytics.style.display = 'block';
            analyticsGrid.innerHTML = '';

            // Finger Analysis
            if (analytics.finger_analysis) {
                const fa = analytics.finger_analysis;
                analyticsGrid.innerHTML += `
                    <div class="analysis-item">
                        <h4>👆 Finger Analysis</h4>
                        <p><strong>Count:</strong> ${fa.finger_count || 'N/A'}</p>
                        <p><strong>Spacing:</strong> ${fa.finger_spacing || 'N/A'}</p>
                        <p><strong>Joint Visibility:</strong> ${fa.joint_visibility || 'N/A'}</p>
                    </div>
                `;
            }

            // Palm Patterns
            if (analytics.palm_patterns) {
                const pp = analytics.palm_patterns;
                analyticsGrid.innerHTML += `
                    <div class="analysis-item">
                        <h4>🖐️ Palm Patterns</h4>
                        <p><strong>Heart Line:</strong> ${pp.heart_line || 'N/A'}</p>
                        <p><strong>Head Line:</strong> ${pp.head_line || 'N/A'}</p>
                        <p><strong>Life Line:</strong> ${pp.life_line || 'N/A'}</p>
                    </div>
                `;
            }

            // Skin Texture
            if (analytics.skin_texture) {
                const st = analytics.skin_texture;
                analyticsGrid.innerHTML += `
                    <div class="analysis-item">
                        <h4>✨ Skin Texture</h4>
                        <p><strong>Quality:</strong> ${st.quality || 'N/A'}</p>
                        <p><strong>Smoothness:</strong> ${st.smoothness ? (st.smoothness * 100).toFixed(0) + '%' : 'N/A'}</p>
                        <p><strong>Tone:</strong> ${st.skin_tone || 'N/A'}</p>
                    </div>
                `;
            }

            // Hand Geometry
            if (analytics.hand_geometry) {
                const hg = analytics.hand_geometry;
                analyticsGrid.innerHTML += `
                    <div class="analysis-item">
                        <h4>📏 Hand Geometry</h4>
                        <p><strong>Shape:</strong> ${hg.hand_shape || 'N/A'}</p>
                        <p><strong>Width:</strong> ${hg.palm_width || 'N/A'}</p>
                        <p><strong>Height:</strong> ${hg.palm_height || 'N/A'}</p>
                    </div>
                `;
            }

            // Vein Pattern
            if (analytics.vein_pattern) {
                const vp = analytics.vein_pattern;
                analyticsGrid.innerHTML += `
                    <div class="analysis-item">
                        <h4>🩸 Vein Pattern</h4>
                        <p><strong>Visible:</strong> ${vp.visible ? 'Yes' : 'No'}</p>
                        <p><strong>Quality:</strong> ${vp.pattern_quality || 'N/A'}</p>
                    </div>
                `;
            }

            // Image Quality
            if (analytics.image_quality) {
                const iq = analytics.image_quality;
                analyticsGrid.innerHTML += `
                    <div class="analysis-item">
                        <h4>📷 Image Quality</h4>
                        <p><strong>Lighting:</strong> ${iq.lighting || 'N/A'}</p>
                        <p><strong>Focus:</strong> ${iq.focus || 'N/A'}</p>
                        <p><strong>Overall:</strong> ${iq.overall_quality || 'N/A'}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
