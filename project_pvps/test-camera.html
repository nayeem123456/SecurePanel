<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        #video {
            width: 100%;
            max-width: 640px;
            border: 2px solid #333;
            display: none;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #45a049;
        }
        #status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            background: #f0f0f0;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <h1>🎥 Camera Test Page</h1>
    <p>This page tests if your webcam works in the browser.</p>
    
    <button id="startBtn">Start Camera</button>
    <button id="stopBtn" style="display:none; background:#f44336;">Stop Camera</button>
    
    <div id="status">Click "Start Camera" to begin test...</div>
    
    <video id="video" autoplay playsinline></video>
    
    <div id="info" style="margin-top: 20px; padding: 15px; background: #e3f2fd; border-radius: 5px;">
        <h3>Browser Info:</h3>
        <p><strong>User Agent:</strong> <span id="userAgent"></span></p>
        <p><strong>Camera API Available:</strong> <span id="apiStatus"></span></p>
        <p><strong>Protocol:</strong> <span id="protocol"></span></p>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        let stream = null;

        // Display browser info
        document.getElementById('userAgent').textContent = navigator.userAgent;
        document.getElementById('apiStatus').textContent = (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) ? '✅ YES' : '❌ NO';
        document.getElementById('protocol').textContent = window.location.protocol;

        startBtn.addEventListener('click', async () => {
            console.log('Start button clicked');
            status.textContent = '⏳ Requesting camera access...';
            status.className = '';
            
            try {
                console.log('Calling getUserMedia...');
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                console.log('Camera access granted!', stream);
                video.srcObject = stream;
                video.style.display = 'block';
                video.play();
                
                status.textContent = '✅ Camera is working! You should see yourself below.';
                status.className = 'success';
                
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                
            } catch (error) {
                console.error('Camera error:', error);
                status.textContent = '❌ Error: ' + error.name + ' - ' + error.message;
                status.className = 'error';
                
                if (error.name === 'NotAllowedError') {
                    status.textContent += '\n\n👉 You denied camera permission. Please allow it in your browser settings.';
                } else if (error.name === 'NotFoundError') {
                    status.textContent += '\n\n👉 No camera found. Please connect a webcam.';
                } else if (error.name === 'NotSupportedError') {
                    status.textContent += '\n\n👉 Camera not supported. Try using HTTPS or localhost.';
                }
            }
        });

        stopBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                video.style.display = 'none';
                status.textContent = 'Camera stopped.';
                status.className = '';
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
